// ── Pinterest Search ──────────────────────────────────────────────
function PinterestSearchSection() {
  const [inputVal, setInputVal] = useState('');
  const [loading, setLoading] = useState(false);
  const [progress, setProgress] = useState(0);
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);

  const runSearch = async () => {
    if (!inputVal.trim() || loading) return;
    setLoading(true);
    setProgress(0);
    setError(null);
    setData(null);

    let p = 0;
    const iv = setInterval(() => { p = Math.min(88, p + Math.random() * 12); setProgress(p); }, 300);

    try {
      const res = await fetch(`/api/pinterest/search?keyword=${encodeURIComponent(inputVal)}`);
      const d = await res.json();
      clearInterval(iv);
      setProgress(100);

      if (d.error) {
        setError(d.error);
      } else {
        setData(d);
      }
    } catch (e) {
      clearInterval(iv);
      setError(e.message);
    }

    setLoading(false);
    setTimeout(() => setProgress(0), 600);
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div className="card">
        <div className="card-title"><span className="card-title-main">Пошук Pinterest</span></div>
        <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
          <div className="search-wrap" style={{ flex: 1, minWidth: 200 }}>
            <svg className="search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none">
              <circle cx="7" cy="7" r="5.5" stroke="currentColor" strokeWidth="1.5" />
              <path d="M11 11l3 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" />
            </svg>
            <input className="search-input" value={inputVal} onChange={e => setInputVal(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && runSearch()} placeholder="Введи ключове слово…" />
          </div>
          <button className="btn btn-primary" style={{ paddingLeft: 18, paddingRight: 18 }} onClick={runSearch} disabled={loading}>
            {loading ? <span className="spinner" /> : '🔍 Пошук'}
          </button>
        </div>

        {progress > 0 && <div className="progress-bar" style={{ marginBottom: 12 }}><div className="progress-fill" style={{ width: `${progress}%` }} /></div>}
        {error && <div style={{ color: 'var(--red)', fontSize: 12, marginBottom: 12 }}>⚠ {error}</div>}

        {!data && !loading && (
          <div className="empty-state" style={{ height: 200, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ fontSize: 24, marginBottom: 8, opacity: 0.4 }}>📌</div>
            <div>Введи ключове слово і натисни Пошук</div>
          </div>
        )}

        {data && (
          <div>
            <div style={{ display: 'flex', gap: 12, marginBottom: 14, flexWrap: 'wrap' }}>
              <div style={{ flex: 1, minWidth: 120, background: 'rgba(255,255,255,0.03)', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px' }}>
                <div style={{ fontSize: 10, color: 'var(--text-muted)', marginBottom: 4, textTransform: 'uppercase' }}>Обсяг (піни/міс)</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: 'var(--pinterest)' }}>{data.volume ? (data.volume / 1000).toFixed(1) + 'K' : '—'}</div>
              </div>
            </div>

            {data.suggestions && data.suggestions.length > 0 && (
              <div className="card" style={{ marginTop: 12 }}>
                <div className="card-title" style={{ marginBottom: 12 }}><span className="card-title-main">Пов'язані запити</span><span style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--text-muted)' }}>{data.suggestions.length}</span></div>
                <div className="kw-list">
                  {data.suggestions.map((kw, i) => (
                    <div className="kw-item" key={i}>
                      <span className="kw-item-term">{kw.term}</span>
                      <span className="kw-item-vol">{kw.vol ? (kw.vol / 1000).toFixed(0) + 'K' : '—'}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Pinterest Overview ──────────────────────────────────────────
function PinterestOverview({ niches, loading }) {
  const [sortBy, setSortBy] = useState('score');
  const [sortDir, setSortDir] = useState('desc');
  const [minScore, setMinScore] = useState(0);
  const [minVolume, setMinVolume] = useState(0);
  const [labels, setLabels] = useState({});
  const runDate = new Date().toISOString().split('T')[0];

  const handleLabelChange = async (keyword, label) => {
    setLabels(prev => ({ ...prev, [keyword]: label }));
    try {
      await fetch('/api/label', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ keyword, label })
      });
    } catch (e) {
      console.error('Error setting label:', e);
    }
  };

  const filtered = niches.filter(n =>
    (n.score ?? 0) >= minScore && (n.pin_volume ?? 0) >= minVolume
  );

  const sorted = [...filtered].sort((a, b) => {
    let aVal = a[sortBy] ?? 0;
    let bVal = b[sortBy] ?? 0;
    const cmp = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
    return sortDir === 'asc' ? cmp : -cmp;
  });

  const handleSort = (field) => {
    if (sortBy === field) {
      setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
    } else {
      setSortBy(field);
      setSortDir('desc');
    }
  };

  const handleExportCSV = async () => {
    const url = `/api/pinterest/export?run_date=${runDate}`;
    const a = document.createElement('a');
    a.href = url;
    a.download = `pinterest_${runDate}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  const handleReportForClaude = async () => {
    try {
      const res = await fetch(`/api/pinterest/report?run_date=${runDate}`);
      const data = await res.json();
      if (data.report) {
        const text = data.report;
        if (navigator.clipboard) {
          await navigator.clipboard.writeText(text);
          alert('✅ Звіт скопійовано в буфер обміну');
        } else {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          alert('✅ Звіт скопійовано в буфер обміну');
        }
      }
    } catch (e) {
      alert('❌ Помилка: ' + e.message);
    }
  };

  if (loading) return <div className="center-spinner"><div className="spinner"/></div>;

  return (
    <div>
      {niches.length > 0 && (
        <div style={{ marginBottom: 16, display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'flex-end' }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <label style={{ fontSize: 11, color: 'var(--text-muted)' }}>Мін. Score</label>
            <input type="range" min="0" max="100" value={minScore} onChange={e => setMinScore(Number(e.target.value))}
              style={{ width: 120, cursor: 'pointer' }} />
            <div style={{ fontSize: 12, fontWeight: 600 }}>{minScore}</div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <label style={{ fontSize: 11, color: 'var(--text-muted)' }}>Мін. Volume</label>
            <input type="range" min="0" max="100000" step="1000" value={minVolume} onChange={e => setMinVolume(Number(e.target.value))}
              style={{ width: 120, cursor: 'pointer' }} />
            <div style={{ fontSize: 12, fontWeight: 600 }}>{(minVolume / 1000).toFixed(0)}K</div>
          </div>
          <button className="btn btn-ghost" onClick={handleReportForClaude} style={{ fontSize: 12 }}>
            📋 Звіт для Claude
          </button>
          <button className="btn btn-ghost" onClick={handleExportCSV} style={{ fontSize: 12 }}>
            📥 Export CSV
          </button>
        </div>
      )}
      <div className="metrics-grid">
        <div className="metric">
          <div className="metric-label">Усього ключів</div>
          <div className="metric-value">{niches.length}</div>
        </div>
        <div className="metric">
          <div className="metric-label">Макс. Volume</div>
          <div className="metric-value">{niches.length ? Math.round(Math.max(...niches.map(n => n.pin_volume || 0))) : 0}</div>
        </div>
        <div className="metric">
          <div className="metric-label">Середня Volume</div>
          <div className="metric-value">{niches.length ? Math.round(niches.reduce((s, n) => s + (n.pin_volume || 0), 0) / niches.length) : 0}</div>
        </div>
        <div className="metric">
          <div className="metric-label">Макс. Score</div>
          <div className="metric-value">{niches.length ? Math.round(Math.max(...niches.map(n => n.score || 0))) : 0}</div>
        </div>
      </div>

      <table className="niches-table">
        <thead>
          <tr>
            <th style={{width:'40px'}}>#</th>
            <th style={{width:'45%', cursor:'pointer'}} onClick={() => handleSort('keyword')}>Ключове слово {sortBy === 'keyword' && (sortDir === 'asc' ? '↑' : '↓')}</th>
            <th style={{cursor:'pointer', width:'80px'}} onClick={() => handleSort('score')}>Оцінка {sortBy === 'score' && (sortDir === 'asc' ? '↑' : '↓')}</th>
            <th style={{cursor:'pointer', width:'80px'}} onClick={() => handleSort('pin_volume')}>Обсяг {sortBy === 'pin_volume' && (sortDir === 'asc' ? '↑' : '↓')}</th>
            <th style={{width:'60px'}}>Спарк</th>
            <th style={{width:'100px'}}>Мітка</th>
          </tr>
        </thead>
        <tbody>
          {sorted.map((niche, i) => {
            const rng = new (function() {
              let x = Math.sin(niche.keyword.charCodeAt(0) + i) * 10000;
              this.next = function() { x = (x - Math.floor(x)) * 10000; return x / 10000; };
            })();
            const sparkValues = Array(8).fill(0).map(() => Math.max(1, Math.round(niche.pin_volume * (0.5 + rng.next()))));

            return (
              <tr key={i}>
                <td style={{opacity:0.7, fontSize:'13px'}}>{i + 1}</td>
                <td style={{fontWeight:'500'}}>{niche.keyword}</td>
                <td style={{textAlign:'center', fontSize:'13px'}}><span style={{background:'oklch(0.62 0.22 10 / 0.2)', padding:'2px 8px', borderRadius:'3px', fontWeight:'600'}}>{niche.score || 0}</span></td>
                <td style={{textAlign:'right', fontSize:'13px'}}>{niche.pin_volume ? (niche.pin_volume / 1000).toFixed(0) + 'K' : '—'}</td>
                <td style={{textAlign:'center', fontSize:'11px'}}><Spark values={sparkValues} /></td>
                <td>
                  <select value={labels[niche.keyword] || 'none'} onChange={e => handleLabelChange(niche.keyword, e.target.value)}
                    style={{fontSize:'11px', padding:'4px 6px', borderRadius:'3px', border:'1px solid var(--border)', background:'var(--bg-secondary)', color:'var(--text)', width:'100%'}}>
                    <option value="none">—</option>
                    <option value="✅ Цікаво">✅ Цікаво</option>
                    <option value="⭐ Пріоритет">⭐ Пріоритет</option>
                    <option value="🔍 Перевірити">🔍 Перевірити</option>
                    <option value="❌ Не релевантно">❌ Не релевантно</option>
                  </select>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
      {niches.length === 0 && <div style={{textAlign:'center', padding:'40px', opacity:0.5}}>Результатів не знайдено. Запусти Pinterest Crawl.</div>}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('overview');
  const [source, setSource] = useState('google');
  const [niches, setNiches] = useState([]);
  const [pinterestCategory, setPinterestCategory] = useState('');
  const [pinterestCategories, setPinterestCategories] = useState([]);
  const [pinterestMaxKw, setPinterestMaxKw] = useState(200);
  const [pCrawling, setPCrawling] = useState(false);
  const [pCrawlPct, setPCrawlPct] = useState(0);
  const [pCrawlKw, setPCrawlKw] = useState('');
  const [pNiches, setPNiches] = useState([]);
  const [pRuns, setPRuns] = useState([]);
  const pPollRef = useRef(null);
  const [runDates, setRunDates] = useState([]);
  const [selectedRun, setSelectedRun] = useState('');
  const [categories, setCategories] = useState([]);
  const [enabled, setEnabled] = useState([]);
  const [allPaths, setAllPaths] = useState([]);
  const [region, setRegion] = useState('US');
  const [timeframe, setTimeframe] = useState('90D');
  const [keyword, setKeyword] = useState('');
  const [unlimited, setUnlimited] = useState(true);
  const [maxNiches, setMaxNiches] = useState(500);
  const [minScore, setMinScore] = useState(0);
  const [minInterest, setMinInterest] = useState(5);
  const [crawling, setCrawling] = useState(false);
  const [crawlPct, setCrawlPct] = useState(0);
  const [crawlKw, setCrawlKw] = useState('');
  const [crawlSeed, setCrawlSeed] = useState('');
  const [crawlRunId, setCrawlRunId] = useState(null);
  const [liveItems, setLiveItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const pollRef = useRef(null);

  const loadNiches = useCallback((geo, runDate='') => {
    setLoading(true);
    const q = runDate ? `?geo=${geo}&run_date=${runDate}` : `?geo=${geo}`;
    fetch('/api/niches'+q).then(r=>r.json()).then(d=>{setNiches(d);setLoading(false);}).catch(()=>setLoading(false));
  }, []);

  const loadRunDates = useCallback((geo) => {
    fetch(`/api/run_dates?geo=${geo}`).then(r=>r.json()).then(d=>{
      setRunDates(d);
      if (d.length && !selectedRun) setSelectedRun(d[0]);
    }).catch(()=>{});
  }, []);

  const loadCategories = useCallback(() => {
    fetch('/api/categories').then(r=>r.json()).then(d=>{
      setCategories(d.categories||[]);
      setEnabled(d.enabled||[]);
      // Collect all paths
      const all = [];
      (d.categories||[]).forEach(cat => {
        all.push(cat.path);
        (cat.children||[]).forEach(ch => {
          all.push(ch.path);
          (ch.children||[]).forEach(gc => all.push(gc.path));
        });
      });
      setAllPaths(all);
    }).catch(()=>{});
  }, []);

  useEffect(()=>{ loadNiches(region); loadRunDates(region); }, [region]);
  useEffect(()=>{ loadCategories(); }, []);

  const handleRunChange = (date) => {
    setSelectedRun(date);
    loadNiches(region, date);
  };

  const saveEnabled = (next) => {
    fetch('/api/categories',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:next})});
  };

  const toggleCat = (path) => {
    setEnabled(prev => {
      const next = prev.includes(path) ? prev.filter(p=>p!==path) : [...prev, path];
      saveEnabled(next);
      return next;
    });
  };

  const selectAll = () => {
    setEnabled(allPaths);
    saveEnabled(allPaths);
  };

  const selectNone = () => {
    setEnabled([]);
    saveEnabled([]);
  };

  const resetDefaults = async () => {
    const d = await fetch('/api/categories/defaults',{method:'POST'}).then(r=>r.json());
    if (d.enabled) setEnabled(d.enabled);
  };

  const startCrawl = async () => {
    if (crawling) return;
    const res = await fetch('/api/crawl',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({geo:region, timeframe, max_niches: unlimited ? 999999 : maxNiches, keyword: crawlSeed, min_interest: minInterest}),
    });
    if (!res.ok) return;
    setCrawling(true); setCrawlPct(0); setLiveItems([]); setCrawlRunId(null);
    pollRef.current = setInterval(async ()=>{
      try {
        const s = await fetch('/api/crawl/status').then(r=>r.json());
        setCrawlPct(s.pct||0); setCrawlKw(s.current_keyword||'');
        if (s.run_id) {
          setCrawlRunId(s.run_id);
          try {
            const items = await fetch(`/api/crawl/live?run_id=${s.run_id}`).then(r=>r.json());
            setLiveItems(items);
          } catch {}
        }
        if (!s.running) { clearInterval(pollRef.current); setCrawling(false); loadNiches(region); loadRunDates(region); }
      } catch { clearInterval(pollRef.current); setCrawling(false); }
    }, 1500);
  };

  useEffect(() => {
    const loadPinterestCategories = async () => {
      try {
        const res = await fetch('/api/pinterest/categories');
        const data = await res.json();
        setPinterestCategories(data.categories || []);
      } catch (e) {
        console.error('Error loading Pinterest categories:', e);
      }
    };
    loadPinterestCategories();
  }, []);

  useEffect(() => {
    if (tab === 'p-overview' && source === 'pinterest') {
      const loadPinterestNiches = async () => {
        try {
          const res = await fetch('/api/pinterest/niches');
          const data = await res.json();
          setPNiches(data.map(n => ({
            keyword: n.keyword,
            level: n.level,
            parent: n.parent,
            pin_volume: n.pin_volume,
            score: n.score,
            label: n.label
          })) || []);
        } catch (e) {
          console.error('Error loading Pinterest niches:', e);
        }
      };
      loadPinterestNiches();
    }
  }, [tab, source]);

  useEffect(()=>()=>{ if(pollRef.current) clearInterval(pollRef.current); },[]);

  const handleSourceSwitch = (s) => {
    setSource(s);
    setTab(s === 'google' ? 'overview' : 'p-overview');
  };

  const startPinterestCrawl = async () => {
    if (pCrawling || !pinterestCategory.trim()) return;
    const res = await fetch('/api/pinterest/crawl', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ category: pinterestCategory, max_keywords: pinterestMaxKw }),
    });
    if (!res.ok) return;
    setPCrawling(true); setPCrawlPct(0);
    pPollRef.current = setInterval(async () => {
      try {
        const s = await fetch('/api/pinterest/crawl/status').then(r => r.json());
        setPCrawlPct(s.pct || 0); setPCrawlKw(s.current_keyword || '');
        if (!s.running) {
          clearInterval(pPollRef.current);
          setPCrawling(false);
          fetch('/api/pinterest/niches').then(r => r.json()).then(setPNiches);
          fetch('/api/pinterest/runs').then(r => r.json()).then(setPRuns);
        }
      } catch { clearInterval(pPollRef.current); setPCrawling(false); }
    }, 800);
  };

  useEffect(() => {
    if (pPollRef.current) return () => clearInterval(pPollRef.current);
  }, []);

  const filteredNiches = niches.filter(n =>
    (!keyword || n.name.toLowerCase().includes(keyword.toLowerCase()))
  );

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-header">
          <div className="logo">
            <div className="logo-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M2 12L6 7l3 3 5-6" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                <circle cx="12" cy="4" r="2" fill="white" fillOpacity="0.9"/>
              </svg>
            </div>
            <span className="logo-text">Trends Analyzer</span>
            <span className="logo-badge">PRO</span>
          </div>
        </div>

        <div className="sidebar-body">
          {/* Source Toggle */}
          <div>
            <div className="sec-label">Джерело</div>
            <div className="source-toggle">
              <button className={`source-btn ${source==='google'?'active-google':''}`} onClick={()=>handleSourceSwitch('google')}>Google Trends</button>
              <button className={`source-btn ${source==='pinterest'?'active-pinterest':''}`} onClick={()=>handleSourceSwitch('pinterest')}>Pinterest</button>
            </div>
          </div>

          {source === 'google' && (
          <>
          {/* Market */}
          <div>
            <div className="sec-label">Ринок</div>
            <div className="select-row">
              <select className="sel" value={region} onChange={e=>setRegion(e.target.value)}>
                {['US','GB','CA','AU','NZ','IE','FR','AT','BE','IT','ES'].map(r=><option key={r} value={r}>{r}</option>)}
              </select>
              <select className="sel" value={timeframe} onChange={e=>setTimeframe(e.target.value)}>
                <option value="7D">7 Днів</option>
                <option value="30D">30 Днів</option>
                <option value="90D">90 Днів</option>
                <option value="1Y">1 Рік</option>
              </select>
            </div>
          </div>

          {/* Limits */}
          <div>
            <div className="sec-label">Ліміт запитів</div>
            <label className="check-row" style={{marginBottom:6}}>
              <input type="checkbox" checked={unlimited} onChange={e=>setUnlimited(e.target.checked)}/>
              <span>Без ліміту</span>
            </label>
            {!unlimited && (
              <input type="number" className="num-input" value={maxNiches} min={10} max={100000} step={100}
                onChange={e=>setMaxNiches(Number(e.target.value))}/>
            )}
          </div>

          {/* Keyword filter */}
          <div>
            <div className="sec-label">Фільтр</div>
            <div className="search-wrap">
              <svg className="search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none">
                <circle cx="7" cy="7" r="5.5" stroke="currentColor" strokeWidth="1.5"/>
                <path d="M11 11l3 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
              <input className="search-input" placeholder="Фільтр ніш…" value={keyword} onChange={e=>setKeyword(e.target.value)}/>
            </div>
          </div>

          {/* Min score */}
          <div>
            <div className="sec-label">Мін. оцінка (фільтр)</div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <input type="range" min={0} max={100} step={5} value={minScore} onChange={e=>setMinScore(+e.target.value)} style={{flex:1,height:4,appearance:'none',background:'rgba(255,255,255,0.1)',borderRadius:2,outline:'none',cursor:'pointer'}}/>
              <span style={{fontSize:11,fontFamily:'DM Mono',color:'var(--accent)',minWidth:28,textAlign:'right'}}>{minScore}</span>
            </div>
          </div>

          {/* Min interest for crawl */}
          <div>
            <div className="sec-label">Мін. інтерес (краулер)</div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <input type="range" min={1} max={50} step={1} value={minInterest} onChange={e=>setMinInterest(+e.target.value)} style={{flex:1,height:4,appearance:'none',background:'rgba(255,255,255,0.1)',borderRadius:2,outline:'none',cursor:'pointer'}}/>
              <span style={{fontSize:11,fontFamily:'DM Mono',color:'var(--accent)',minWidth:28,textAlign:'right'}}>{minInterest}</span>
            </div>
            <div style={{fontSize:10,color:'var(--text-muted)',marginTop:3}}>avg interest ≥ {minInterest} щоб слово зберіглось</div>
          </div>

          {/* Categories */}
          <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
            <div className="sec-label">Категорії</div>
            <div style={{flex:1,overflowY:'auto',paddingRight:2}}>
              <CategoryTree categories={categories} enabled={enabled} onToggle={toggleCat}
                onSelectAll={selectAll} onSelectNone={selectNone} onDefaults={resetDefaults}/>
            </div>
          </div>

          {/* Custom keyword */}
          <div>
            <div className="sec-label">Конкретне слово</div>
            <div className="search-wrap">
              <svg className="search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none">
                <circle cx="7" cy="7" r="5.5" stroke="currentColor" strokeWidth="1.5"/>
                <path d="M11 11l3 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
              <input className="search-input" placeholder="напр. yoga mat…" value={crawlSeed}
                onChange={e=>setCrawlSeed(e.target.value)}/>
            </div>
            {crawlSeed && <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>Категорії ігноруються</div>}
          </div>

          {/* Actions */}
          <div className="btn-actions">
            {crawling && (
              <div className="crawl-status">
                <div className="crawl-dot"/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',justifyContent:'space-between'}}>
                    <span>Краулер…</span><span>{Math.round(crawlPct)}%</span>
                  </div>
                  {crawlKw && <div style={{fontSize:10,opacity:0.7,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginTop:1}}>{crawlKw}</div>}
                  <div className="progress-bar" style={{marginTop:4}}><div className="progress-fill" style={{width:`${crawlPct}%`}}/></div>
                </div>
              </div>
            )}
            <button className="btn btn-primary" onClick={startCrawl} disabled={crawling}>
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="white" strokeWidth="1.5"/><path d="M6 5.5l5 2.5-5 2.5V5.5z" fill="white"/></svg>
              {crawling ? 'Виконується…' : 'Запустити'}
            </button>
            <a href={`/api/report?geo=${region}`} className="btn btn-ghost">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="2" y="1" width="10" height="14" rx="1.5" stroke="currentColor" strokeWidth="1.4"/><path d="M5 5h6M5 8h6M5 11h4" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>
              Звіт для Claude
            </a>
            <a href={`/api/export?geo=${region}`} className="btn btn-ghost">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 3v8M5 8l3 3 3-3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><rect x="2" y="11" width="12" height="3" rx="1" stroke="currentColor" strokeWidth="1.3"/></svg>
              Export CSV
            </a>
          </div>
          </>
          )}

          {source === 'pinterest' && (
          <>
          {/* Pinterest Categories */}
          <div>
            <div className="sec-label">Категорія</div>
            <select value={pinterestCategory} onChange={e => setPinterestCategory(e.target.value)} className="search-input" style={{padding:'8px 12px', fontSize:'14px'}}>
              <option value="">-- Вибери категорію --</option>
              {pinterestCategories.map(cat => (
                <option key={cat.id} value={cat.name}>{cat.name}</option>
              ))}
            </select>
          </div>

          {/* Pinterest Max Keywords */}
          <div>
            <div className="sec-label">Макс. ключові слова</div>
            <input type="number" className="num-input" value={pinterestMaxKw} min={10} max={500} step={10} onChange={e => setPinterestMaxKw(Number(e.target.value))} />
          </div>

          {/* Pinterest Actions */}
          <div className="btn-actions">
            {pCrawling && (
              <div className="crawl-status" style={{ borderColor: 'oklch(0.62 0.22 10 / 0.25)', background: 'oklch(0.62 0.22 10 / 0.1)' }}>
                <div className="crawl-dot" style={{ background: 'var(--pinterest)' }} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                    <span>Pinterest…</span><span>{Math.round(pCrawlPct)}%</span>
                  </div>
                  {pCrawlKw && <div style={{ fontSize: 10, opacity: 0.7, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', marginTop: 1 }}>{pCrawlKw}</div>}
                  <div className="progress-bar" style={{ marginTop: 4 }}>
                    <div className="progress-fill" style={{ width: `${pCrawlPct}%`, background: 'linear-gradient(90deg, var(--pinterest), oklch(0.7 0.2 30))' }} />
                  </div>
                </div>
              </div>
            )}
            <button className="btn btn-primary" style={{ background: 'linear-gradient(135deg, var(--pinterest), oklch(0.7 0.2 30))' }} onClick={startPinterestCrawl} disabled={pCrawling || !pinterestCategory.trim()}>
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="white" strokeWidth="1.5"/><path d="M6 5.5l5 2.5-5 2.5V5.5z" fill="white"/></svg>
              {pCrawling ? 'Виконується…' : 'Pinterest Crawl'}
            </button>
          </div>
          </>
          )}
        </div>
      </aside>

      <div className="main">
        <div className="topbar">
          <div className="topbar-tabs">
            {source === 'google' && [
              {id:'overview',label:'Огляд'},
              {id:'search',label:'Пошук тренду'},
              {id:'history',label:'Історія'}
            ].map(t=>(
              <div key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
                <div className="tab-dot"/>{t.label}
              </div>
            ))}
            {source === 'pinterest' && [
              {id:'p-overview',label:'Pinterest Огляд'},
              {id:'p-search',label:'Pinterest Пошук'},
              {id:'p-history',label:'Pinterest Історія'}
            ].map(t=>(
              <div key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
                <div className="tab-dot" style={{background:'var(--pinterest)'}}/>{t.label}
              </div>
            ))}
          </div>
          <div className="topbar-right">
            {source === 'google' && (
              <>
                <span className="topbar-pill">Регіон: {region}</span>
                <span className="topbar-pill">{niches.length} ніш</span>
              </>
            )}
            {source === 'pinterest' && (
              <span className="topbar-pill" style={{color:'var(--pinterest)'}}>📌 {pNiches.length} ключів</span>
            )}
            <div className="avatar">TA</div>
          </div>
        </div>

        <div className="content">
          {source === 'google' && (
            <>
              {tab==='overview' && (
                loading
                  ? <div className="center-spinner"><div className="spinner"/></div>
                  : <OverviewSection niches={filteredNiches} setNiches={setNiches} minScore={minScore}
                      geo={region} runDates={runDates} selectedRun={selectedRun} onRunChange={handleRunChange}
                      crawling={crawling} liveItems={liveItems} crawlKw={crawlKw}/>
              )}
              {tab==='search' && <SearchSection geo={region}/>}
              {tab==='history' && <HistorySection geo={region}/>}
            </>
          )}
          {source === 'pinterest' && (
            <>
              {tab==='p-overview' && <PinterestOverview niches={pNiches} loading={false} />}
              {tab==='p-search' && <PinterestSearchSection />}
              {tab==='p-history' && <PinterestHistory />}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
